{% load static %}
<!-- NORMAN SLE Chatbot Widget - FIXED -->

<link rel="stylesheet" href="{% static 'css/chatbot.css' %}">

<!-- Chatbot Toggle Button -->
<button class="chatbot-button" id="chatbotToggle" aria-label="Toggle Chatbot">
    <svg id="chatIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <rect x="5" y="6" width="14" height="2" rx="1"/>
        <rect x="5" y="11" width="14" height="2" rx="1"/>
        <rect x="5" y="16" width="14" height="2" rx="1"/>
    </svg>
    
    <svg id="closeIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
</button>

<!-- Chatbot Container -->
<div class="chatbot-container" id="chatbotContainer">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-header-content">
            <div class="chatbot-avatar">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <div class="chatbot-header-text">
                <h3>SLE Chatbot</h3>
                <p>
                    <span class="status-indicator"></span>
                    Ready to help
                </p>
            </div>
        </div>
        <button class="chatbot-close" id="chatbotClose" aria-label="Close chatbot">&times;</button>
    </div>

    <!-- Messages Area -->
    <div class="chatbot-messages" id="chatbotMessages">
        <!-- Welcome Message -->
        <div class="message bot">
            <div class="message-avatar">NS</div>
            <div class="message-content">
                <div class="message-bubble">
                    Hi! 👋 I'm your FAQ Assistant. Choose a category below or ask me anything.
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>

        <!-- Tip Message -->
        <div class="message bot">
            <div class="message-avatar">NS</div>
            <div class="message-content">
                <div class="message-bubble">
                    💡 <strong>Tip:</strong> I can answer FAQ questions AND search the database!
                    <br>Try: "Find chemicals containing benzene" or "How many PFAS compounds?"
                </div>
            </div>
        </div>
    </div>  <!-- ✅ End of chatbot-messages -->

    <!-- ✅ FIXED: Typing Indicator (OUTSIDE messages area) -->
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
        <div class="hexagon-spinner">
            <div class="hex hex1"></div>
            <div class="hex hex2"></div>
            <div class="hex hex3"></div>
        </div>
        <span class="loading-text">Thinking...</span>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions-sticky">
        <button class="back-to-categories" id="backButton">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back to Categories
        </button>
        
        <div class="quick-actions" id="categoriesView"></div>
        <div class="quick-actions" id="questionsView"></div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input-area">
        <textarea 
            class="chatbot-input" 
            id="chatbotInput" 
            placeholder="Ask me anything..." 
            rows="1"
        ></textarea>
        
        <button class="chatbot-send-button" id="chatbotSend">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    window.CHATBOT_CONFIG = {
        apiEndpoint: '{% url "chatbot:chatbot_api" %}',
        csrfToken: '{{ csrf_token }}',
    };
</script>

<script src="{% static 'js/chatbot.js' %}"></script>
