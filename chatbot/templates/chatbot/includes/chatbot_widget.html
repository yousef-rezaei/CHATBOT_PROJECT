{% load static %}
<!-- NORMAN SLE Chatbot Widget - CATEGORY NAVIGATION SYSTEM -->

<!-- Link to External CSS -->
<link rel="stylesheet" href="{% static 'css/chatbot.css' %}">

<!-- Chatbot Toggle Button -->
<button class="chatbot-button" id="chatbotToggle" aria-label="Toggle NORMAN SLE Assistant">
    <!-- Menu Icon (3 lines) -->
    <svg id="chatIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <rect x="5" y="6" width="14" height="2" rx="1"/>
        <rect x="5" y="11" width="14" height="2" rx="1"/>
        <rect x="5" y="16" width="14" height="2" rx="1"/>
    </svg>
    
    <!-- Close Icon (X) -->
    <svg id="closeIcon" style="display: none;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
</button>

<!-- Chatbot Container -->
<div class="chatbot-container" id="chatbotContainer">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-header-content">
            <div class="chatbot-avatar">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <div class="chatbot-header-text">
                <h3>NORMAN SLE Assistant</h3>
                <p>
                    <span class="status-indicator"></span>
                    Ready to help
                </p>
            </div>
        </div>
        <button class="chatbot-close" id="chatbotClose" aria-label="Close chatbot">&times;</button>
    </div>

    <!-- Messages Area -->
    <div class="chatbot-messages" id="chatbotMessages">
        <!-- Initial Bot Message -->
        <div class="message bot">
            <div class="message-avatar">NS</div>
            <div class="message-content">
                <div class="message-bubble">
                    Hi! 👋 I'm the NORMAN SLE Assistant. Choose a category below or ask me anything.
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="message bot">
            <div class="message-avatar">NS</div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- Sticky Quick Actions with Category Navigation -->
    <div class="quick-actions-sticky">
        <!-- Back Button (hidden by default) -->
        <button class="back-to-categories" id="backButton" style="display: none;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back to Categories
        </button>
        
        <!-- Categories View (shown by default) -->
        <div class="quick-actions categories-scroll" id="categoriesView">
            <button class="quick-action-btn category-btn" data-category="Getting started">
                📖 Getting Started
            </button>
            <button class="quick-action-btn category-btn" data-category="Using the website">
                🖥️ Using Website
            </button>
            <button class="quick-action-btn category-btn" data-category="Data & identifiers">
                🔍 Data & IDs
            </button>
            <button class="quick-action-btn category-btn" data-category="Versioning & citation">
                📝 Citation
            </button>
            <button class="quick-action-btn category-btn" data-category="Integrations">
                🔗 Integrations
            </button>
            <button class="quick-action-btn category-btn" data-category="Contributing lists">
                ➕ Contributing
            </button>
            <button class="quick-action-btn category-btn" data-category="FAIR & licensing">
                ⚖️ FAIR
            </button>
            <button class="quick-action-btn category-btn" data-category="Troubleshooting">
                🔧 Help
            </button>
            <button class="quick-action-btn category-btn" data-category="About the project">
                ℹ️ About
            </button>
        </div>
        
        <!-- Questions View (hidden by default) -->
        <div class="quick-actions questions-scroll" id="questionsView" style="display: none;">
            <!-- Questions dynamically loaded here -->
        </div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input-area">
        <textarea 
            class="chatbot-input" 
            id="chatbotInput" 
            placeholder="Ask about suspect lists..." 
            rows="1"
            aria-label="Message input"
        ></textarea>
        
        <button class="chatbot-send-button" id="chatbotSend" aria-label="Send message">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<!-- Additional Styles for Category Navigation -->
<style>
/* Back button */
.back-to-categories {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: white;
    border: 1px solid #c0d6c0;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #6b9e78;
    cursor: pointer;
    transition: all 0.2s ease;
    width: fit-content;
}

.back-to-categories:hover {
    background: #e8f4ea;
    border-color: #6b9e78;
}

.back-to-categories svg {
    flex-shrink: 0;
}

/* Category buttons with emojis */
.category-btn {
    font-size: 12px !important;
    padding: 8px 12px !important;
}

/* Question buttons */
.question-btn {
    font-size: 12px !important;
    padding: 8px 12px !important;
    text-align: left;
}

/* Ensure scrolling works */
.categories-scroll,
.questions-scroll {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 8px;
    overflow-x: auto;
    scroll-behavior: smooth;
}
</style>

<!-- FAQ Data from CSV -->
<script id="faqData" type="application/json">
{
    "Getting started": [
        {"q": "What is NORMAN-SLE?", "a": "NORMAN-SLE is an open, community-driven platform that collects and publishes suspect lists (predefined lists of chemicals expected or suspected to occur in a given matrix) to support high-resolution mass spectrometry (HRMS) suspect screening. The lists are made publicly accessible together with references and key identifiers to enable efficient screening and reuse across studies and tools."},
        {"q": "Why use it?", "a": "NORMAN-SLE helps researchers 'screen smart' by offering many curated suspect lists with consistent identifiers and references, so you can choose lists relevant to your study and apply them directly in LC/GC-MS workflows. Lists are versioned and citable via DOIs, and interoperability is improved through integration with major databases (e.g., PubChem and CompTox)."},
        {"q": "What is the scope?", "a": "NORMAN-SLE focuses on suspect lists relevant to environmental science and monitoring, especially organic contaminants amenable to liquid or gas chromatography coupled to mass spectrometry. The collections span many domains (e.g., PFAS, transformation products, pharmaceuticals, pesticides, food-contact chemicals, endocrine disruptors, ionic liquids, UVCBs and more)."},
        {"q": "What is a suspect list?", "a": "A suspect list is a predefined list of chemicals of interest or suspected to occur in a specific matrix. In HRMS workflows, suspect lists enable faster and more focused screening than untargeted approaches by allowing you to search for expected masses and identifiers. They can also be used to prepare inclusion lists in advance of analysis."},
        {"q": "SLE vs SusDat?", "a": "NORMAN-SLE provides access to individual suspect lists with references and identifiers. NORMAN SusDat is a merged and curated data table that combines SLE contributions and adds additional parameters to support broader NORMAN activities and large-scale screening."}
    ],
    "Using the website": [
        {"q": "How do I find a list?", "a": "On the NORMAN-SLE website, suspect lists are presented in a table that typically includes the list number (S-code), abbreviation, description, links to the full list file, links to the InChIKey file (when available), and references. Use the description and references to choose the list most relevant to your project."},
        {"q": "What do the columns mean?", "a": "The table columns are designed to help you quickly understand and download each list: • Number: the sequential S-number assigned to the list (e.g., S100). • Abbreviation: a short code to identify the list. • Description: what the list contains. • Link to full list: download the main dataset (often CSV/XLSX). • Link to InChIKey list: download an InChIKey-only file (if structures are defined). • References: publications or sources that describe the list."},
        {"q": "What formats are available?", "a": "NORMAN-SLE lists are generally provided in interoperable formats such as CSV and Excel (XLSX). Many lists also provide a separate InChIKey file to support fast screening workflows. Some lists include additional files or multiple sheets to preserve extra details."},
        {"q": "Why references matter?", "a": "References help users understand where the list came from, why it was created, and how it should be used. They also provide proper credit to contributors and allow users to trace the scientific rationale behind the list content."}
    ],
    "Data & identifiers": [
        {"q": "Which identifiers are used?", "a": "Suspect lists commonly include at least one chemical name and structural identifiers such as SMILES and InChI (including InChIKey). Database identifiers may include CAS numbers, PubChem CIDs, ChemSpider IDs, and/or DSSTox identifiers (DTXSID) used by CompTox. Many lists also include molecular formula and (neutral) monoisotopic mass to support screening."},
        {"q": "Why an InChIKey-only file?", "a": "A dedicated InChIKey-only file enables very fast screening in many workflows and tools. For example, it can be used to quickly prefilter suspects in some in silico fragmentation tools and pipelines, and it supports deep indexing and lookups by a compact identifier."},
        {"q": "Do all entries have structures?", "a": "Not all lists contain complete structural information. Some lists are formula-based or contain partially characterized substances (e.g., isomeric mixtures, surfactants, or certain PFAS from patents). In such cases, InChI or InChIKey may not exist."},
        {"q": "What info in list entry?", "a": "A suspect list entry can include: chemical name and synonyms; structural identifiers (SMILES, InChI, InChIKey); database IDs (CAS, DTXSID, PubChem CID, etc.); and screening-relevant fields like molecular formula and neutral monoisotopic mass. Some lists add context-specific annotations."}
    ],
    "Versioning & citation": [
        {"q": "How do I cite a list?", "a": "Each suspect list is archived as a Zenodo record with a DOI, enabling formal citation. If you used a specific version, cite that version's DOI for reproducibility. You can also cite the 'concept DOI' (the master DOI) that redirects to the latest version."},
        {"q": "How does versioning work?", "a": "NORMAN-SLE uses Zenodo's versioning to track changes. A common pattern is NORMAN-SLE-SXX-0.Y.Z (SXX = list number). Major updates (increase Y) typically add new entries or substantial content; minor updates (increase Z) fix or adjust existing content."},
        {"q": "Which version should I use?", "a": "For most analyses, use the latest version to benefit from corrections and improvements. For reproducibility, record the exact version downloaded (including the Zenodo version and DOI) and cite it in your work."}
    ],
    "Integrations": [
        {"q": "How is SLE in PubChem?", "a": "NORMAN-SLE content is integrated into PubChem through substance depositions compiled from list files (often linked from Zenodo via mapping files). PubChem assigns Substance IDs (SIDs) to deposited entries and generates Compound IDs (CIDs) for defined structures after standardization."},
        {"q": "SID vs CID?", "a": "In PubChem, a Substance ID (SID) represents a deposited substance record, which can include entries without fully defined structures. A Compound ID (CID) represents a unique, standardized chemical structure extracted from depositions."},
        {"q": "How is SLE in CompTox?", "a": "NORMAN-SLE lists are integrated into CompTox through the 'Chemical Lists' functionality by uploading DTXSIDs linked to each list. Because CompTox updates are less frequent and some SLE substances may not have DTXSIDs, the CompTox versions can be incomplete and may lag behind the latest SLE/Zenodo versions."},
        {"q": "Why versions differ?", "a": "Different platforms have different update cycles (PubChem can update quickly; CompTox is less frequent), so versions can diverge. For reproducibility, rely on the Zenodo DOI/version you used."},
        {"q": "Can I access programmatically?", "a": "NORMAN-SLE list files are downloadable (CSV/XLSX) for use in scripts and pipelines. In addition, downstream resources such as PubChem's Classification Browser can be accessed programmatically, which can help automate retrieval and analysis of list content."}
    ],
    "Contributing lists": [
        {"q": "How can I submit a list?", "a": "NORMAN-SLE welcomes new list submissions. Submissions are typically made by sending the list (often CSV/XLSX) to the NORMAN-SLE contact points. Provide clear references, a description, and as many reliable chemical identifiers as possible to support curation."},
        {"q": "What should I include?", "a": "At minimum, include at least one chemical name and, where possible, structural identifiers (SMILES and InChI/InChIKey). If available, also include database identifiers (CAS RN, PubChem CID, DSSTox/DTXSID, etc.), molecular formula, and neutral monoisotopic mass. Provide references and context."},
        {"q": "What happens after submission?", "a": "After submission, the list is processed depending on its size and content. NORMAN-SLE assigns a sequential S-number and an abbreviation following conventions. Where possible, missing values are filled using curation workflows, then the list is published on the website and archived on Zenodo with a DOI."},
        {"q": "How strict is curation?", "a": "NORMAN-SLE performs curation to improve identifiers and fill missing values where feasible, but it generally aims to represent submissions as provided. Extensive curation comparable to large national/agency databases may not always be possible. Versioning on Zenodo helps track improvements over time."},
        {"q": "Can I send feedback?", "a": "Yes—NORMAN-SLE welcomes new submissions and feedback, including suggestions for improvements, corrections, and ideas for new features or workflows. Use the contact information on the NORMAN-SLE website to reach the maintainers."}
    ],
    "FAIR & licensing": [
        {"q": "How is SLE FAIR?", "a": "NORMAN-SLE supports FAIRness by using dataset DOIs and InChIKeys for findability, providing open downloads (often through Zenodo) for accessibility, using interoperable chemical identifiers (SMILES/InChI) for integration, and enabling reuse through open licensing and community standards."},
        {"q": "What is the license?", "a": "NORMAN-SLE lists are archived on Zenodo with clear licensing and citation information. Many lists are shared under a permissive open license such as CC-BY 4.0, allowing reuse with appropriate attribution. Always check the license on the specific list's Zenodo record."}
    ],
    "Troubleshooting": [
        {"q": "No InChIKey file?", "a": "InChIKeys can only be generated for defined chemical structures. If a list contains mostly formula-only entries, mixtures, or undefined structures (e.g., certain surfactant or UVCB-related content), an InChIKey-only file may not be available."},
        {"q": "What is MS-ready?", "a": "'MS-ready' refers to representing chemicals in a standardized form suitable for mass-spectral screening (e.g., neutral forms). This can reduce trivial screening errors such as searching exact masses of salts or polymers. NORMAN SusDat provides MS-ready content."},
        {"q": "How are errors fixed?", "a": "If issues are found (e.g., incorrect SMILES, CAS numbers, or mismatched identifiers), they can be corrected and released as a new Zenodo version of the list (often as a minor update). Updated versions may later propagate to PubChem/CompTox depending on their update cycles."},
        {"q": "Why missing in CompTox?", "a": "CompTox integration relies on DSSTox identifiers (DTXSIDs). If a chemical has no DTXSID, it cannot be included in the CompTox list. Additionally, CompTox updates may lag, so newly added or updated SLE lists may take weeks/months to appear."},
        {"q": "How are mixtures handled?", "a": "Mixtures and UVCBs can be represented in suspect lists, but they often lack a single defined structure and thus cannot always be assigned InChI/InChIKeys or PubChem CIDs. Handling such content remains a known challenge in cheminformatics, and SLE often preserves the information as provided."}
    ],
    "About the project": [
        {"q": "How big is SLE?", "a": "As of September/October 2025, NORMAN-SLE includes 133 lists totaling 133,573 unique compounds (numbers can change with updates)."},
        {"q": "When did it start?", "a": "NORMAN initiated the NORMAN-SLE in 2015 to facilitate open exchange of suspect lists. Since 2019, lists have been archived on Zenodo, which enables DOIs, versioning and better integration with external resources."},
        {"q": "What do metrics mean?", "a": "Usage metrics from Zenodo are often used to estimate impact: views reflect how often users look at list records, downloads reflect how often lists are reused in workflows, and citations reflect formal recognition in research outputs."}
    ]
}
</script>

<!-- Category Navigation JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Get FAQ data
    const faqData = JSON.parse(document.getElementById('faqData').textContent);
    
    // Elements
    const categoriesView = document.getElementById('categoriesView');
    const questionsView = document.getElementById('questionsView');
    const backButton = document.getElementById('backButton');
    const categoryButtons = document.querySelectorAll('.category-btn');
    
    // Handle category clicks
    categoryButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            const category = this.dataset.category;
            showQuestions(category);
        });
    });
    
    // Handle back button
    backButton.addEventListener('click', showCategories);
    
    function showQuestions(category) {
        // Hide categories, show questions
        categoriesView.style.display = 'none';
        questionsView.style.display = 'flex';
        backButton.style.display = 'flex';
        
        // Get questions
        const questions = faqData[category] || [];
        
        // Clear and populate
        questionsView.innerHTML = '';
        questions.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'quick-action-btn question-btn';
            btn.textContent = item.q;
            btn.dataset.message = item.q;
            btn.dataset.answer = item.a;
            
            // Add click handler to send question and show answer
            btn.addEventListener('click', function() {
                handleQuestionClick(item.q, item.a);
            });
            
            questionsView.appendChild(btn);
        });
    }
    
    function handleQuestionClick(question, answer) {
        // Add user message to chat
        addMessage(question, 'user');
        
        // Show typing indicator
        const typingIndicator = document.getElementById('typingIndicator');
        if (typingIndicator) {
            typingIndicator.classList.add('active');
        }
        
        // Send to backend API (same as typing)
        fetch(window.CHATBOT_CONFIG.apiEndpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': window.CHATBOT_CONFIG.csrfToken
            },
            body: JSON.stringify({
                message: question
            })
        })
        .then(response => response.json())
        .then(data => {
            // Hide typing indicator
            if (typingIndicator) {
                typingIndicator.classList.remove('active');
            }
            
            // Add bot answer from backend
            addMessage(data.response || data.message || answer, 'bot');
            
            // Go back to categories after answering
            setTimeout(() => {
                showCategories();
            }, 500);
        })
        .catch(error => {
            console.error('Error:', error);
            
            // Hide typing indicator
            if (typingIndicator) {
                typingIndicator.classList.remove('active');
            }
            
            // Fallback to embedded answer if API fails
            addMessage(answer, 'bot');
            
            // Go back to categories
            setTimeout(() => {
                showCategories();
            }, 500);
        });
    }
    
    function addMessage(text, sender) {
        const messagesContainer = document.getElementById('chatbotMessages');
        
        // Create message element
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'message-avatar';
        avatarDiv.textContent = sender === 'bot' ? 'NS' : 'U';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'message-bubble';
        bubbleDiv.textContent = text;
        
        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        
        contentDiv.appendChild(bubbleDiv);
        contentDiv.appendChild(timeDiv);
        
        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);
        
        // Insert before typing indicator
        const typingIndicator = document.getElementById('typingIndicator');
        if (typingIndicator && typingIndicator.parentElement) {
            messagesContainer.insertBefore(messageDiv, typingIndicator.parentElement);
        } else {
            messagesContainer.appendChild(messageDiv);
        }
        
        // Scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function showCategories() {
        categoriesView.style.display = 'flex';
        questionsView.style.display = 'none';
        backButton.style.display = 'none';
    }
});
</script>

<!-- JavaScript Configuration -->
<script>
    window.CHATBOT_CONFIG = {
        apiEndpoint: '{% url "chatbot:chatbot_api" %}',
        csrfToken: '{{ csrf_token }}',
    };
</script>

<script src="{% static 'js/chatbot.js' %}"></script>
