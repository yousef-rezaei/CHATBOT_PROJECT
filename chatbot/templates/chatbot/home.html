{% extends 'chatbot/base.html' %}

{% block title %}NORMAN SLE{% endblock %}

{% block extra_css %}
<style>
    body {
        margin: 0;
        padding: 0;
        /* Green gradient matching chatbot theme */
        background: linear-gradient(135deg, #e8f4ea 0%, #c5e1ca 50%, #a8c5a8 100%);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Optional: Subtle pattern overlay */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(107, 158, 120, 0.08) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(107, 158, 120, 0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }
</style>
{% endblock %}

{% block content %}
<!-- Empty content - only chatbot button will be visible -->
{% endblock %}
